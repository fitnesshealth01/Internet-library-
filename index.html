<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Modern Inline SVG Favicon and Canonical link -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>📚</text></svg>">
    <link rel="canonical" href="https://internet-library.demo" />
    
    <!-- Comprehensive SEO Title and Meta Description -->
    <title>Internet Library - Expert Curations & Technical Deep Dives</title>
    <meta name="description" content="Explore the Internet Library, a premier scholar-curated discovery hub for engineering, system architectures, and academic research. Syncing live feeds, deep-dives, and interactive learning paths." />
    <meta name="keywords" content="internet library, technology deep dive, software engineering blueprints, research discovery hub, academic learning paths, system architecture manuals" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="author" content="Expert Editorial Board & Scholars" />
    
    <!-- Open Graph (OG) Meta Tags for Social Media Curation -->
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Internet Library - Human Knowledge, Connected" />
    <meta property="og:description" content="Delve into authoritative systems guides, computer science treatises, and live news syndications with the Internet Library discovery engine." />
    <meta property="og:site_name" content="Internet Library" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1200&auto=format&fit=crop" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Internet Library - Human Knowledge, Connected" />
    <meta name="twitter:description" content="Delve into authoritative systems guides, computer science treatises, and live news syndications with the Internet Library discovery engine." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1200&auto=format&fit=crop" />

    <!-- Google Publisher / AdSense / Crawler Optimizations -->
    <meta name="google-adsense-account" content="ca-pub-9246342607636743" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9246342607636743" crossorigin="anonymous"></script>
    <meta name="rating" content="General" />
    
    <!-- JSON-LD Semantic Structured Schema Markup for E-E-A-T Authority -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://internet-library.demo/#organization",
          "name": "Internet Library Collective",
          "url": "https://internet-library.demo",
          "logo": {
            "@type": "ImageObject",
            "url": "https://internet-library.demo/assets/logo.png"
          },
          "description": "A global collective of peer scholars and technical writers dedicated to open access research and technical indexing."
        },
        {
          "@type": "WebSite",
          "@id": "https://internet-library.demo/#website",
          "url": "https://internet-library.demo",
          "name": "Internet Library",
          "publisher": {
            "@id": "https://internet-library.demo/#organization"
          },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://internet-library.demo/explore?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
